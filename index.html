<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Bot Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Minecraftia', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            width: 95vw;
            height: 95vh;
            max-width: 800px;
            background: #3a3a3a;
            border: 4px solid #000;
            padding: 10px;
            display: grid;
            grid-template-rows: auto auto auto 1fr;
            gap: 10px;
        }
        .header {
            text-align: center;
            border-bottom: 4px solid #888;
            padding-bottom: 5px;
            color: #55FF55;
            font-size: 16px;
        }
        .grid-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .panel {
            background: #2a2a2a;
            border: 2px solid #555;
            padding: 5px;
        }
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }
        label { color: #FFAA00; font-size: 10px; }
        input, select {
            background: #111; color: #55FF55; border: 1px solid #555;
            padding: 4px; font-family: 'Minecraftia', sans-serif; font-size: 10px; width: 100%;
        }
        .checkbox-row {
            display: flex; align-items: center; gap: 5px; margin-top: 5px;
        }
        .checkbox-row input { width: auto; cursor: pointer; }
        .status-panel {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; text-align: center; font-size: 12px;
        }
        .box { background: #1a1a1a; padding: 5px; border: 2px solid #555; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button {
            padding: 8px; font-family: 'Minecraftia', sans-serif; font-size: 10px;
            cursor: pointer; border: 2px solid #000; color: white; font-weight: bold;
        }
        .btn-start { background: #55AA55; }
        .btn-stop { background: #AA5555; }
        .log-container {
            background: #0a0a0a; border: 2px solid #000; font-size: 9px;
            color: #888; overflow-y: auto; padding: 5px; height: 100%;
        }
        .log-entry { margin-bottom: 2px; border-left: 2px solid #555; padding-left: 4px; }
        .error { color: #FF5555; border-color: #FF5555; }
        .success { color: #55FF55; border-color: #55FF55; }
        .info { color: #FFAA00; border-color: #FFAA00; }
        .alert-box {
            background: #663333; border: 2px solid #FF5555; color: #FF5555;
            font-size: 10px; text-align: center; display: none; padding: 5px; margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">MINECRAFT BOT DASHBOARD <span id="editionBadge"></span></div>
        
        <div class="grid-top">
            <div class="panel">
                <div class="config-grid">
                    <div><label>Host</label><input type="text" id="hostInput" value="localhost"></div>
                    <div><label>Port</label><input type="text" id="portInput" value="19132"></div>
                    <div><label>Username</label><input type="text" id="usernameInput" value="MinecraftBot"></div>
                    <div>
                        <label>Edition</label>
                        <select id="editionSelect">
                            <option value="bedrock">Bedrock</option>
                            <option value="java">Java</option>
                        </select>
                    </div>
                    <div id="versionRow" style="display:none;"><label>Version</label><input type="text" id="versionInput" value="1.20.1"></div>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="autoRejoin" checked>
                    <label>Auto Rejoin</label>
                </div>
            </div>
            
            <div class="panel">
                <div class="status-panel">
                    <div class="box">STATUS<br><span id="status" style="color:#FFAA00">DISCONNECTED</span></div>
                    <div class="box">OP STATUS<br><span id="opStatus" style="color:#FFAA00">UNKNOWN</span></div>
                    <div class="box">UPTIME<br><span id="uptime" style="color:#55FF55">0h 0m 0s</span></div>
                    <div class="box">GAME TIME<br><span id="gameTime" style="color:#55FF55">-</span></div>
                </div>
                <div class="alert-box" id="alertBox"><span id="alertMessage"></span></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-start" onclick="startBot()">START BOT</button>
            <button class="btn-stop" onclick="stopBot()">STOP BOT</button>
        </div>

        <div class="log-container" id="logs">
            <div class="log-entry info">Waiting for connection...</div>
        </div>
    </div>

    <script>
        const socket = io();
        const statusEl = document.getElementById('status');
        const logsEl = document.getElementById('logs');
        const editionSelect = document.getElementById('editionSelect');
        const versionRow = document.getElementById('versionRow');

        document.addEventListener('DOMContentLoaded', () => {
            fetch('settings.json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hostInput').value = data.host || 'localhost';
                    document.getElementById('portInput').value = data.port || '19132';
                    document.getElementById('usernameInput').value = data.username || 'MinecraftBot';
                    editionSelect.value = data.edition || 'bedrock';
                    document.getElementById('versionInput').value = data.javaVersion || '1.20.1';
                    editionSelect.dispatchEvent(new Event('change'));
                })
                .catch(error => console.error('Error loading config:', error));
        });
        
        editionSelect.addEventListener('change', (e) => {
            versionRow.style.display = e.target.value === 'java' ? 'block' : 'none';
        });

        socket.on('time_update', (data) => {
            document.getElementById('uptime').innerText = data.uptime;
            document.getElementById('gameTime').innerText = data.gamePeriod;
        });

        socket.on('status_update', (status) => {
            statusEl.innerText = status.toUpperCase();
            statusEl.style.color = status === 'Connected' ? '#55FF55' : (status === 'Disconnected' ? '#FF5555' : '#FFAA00');
        });

        socket.on('active_edition', (edition) => {
            document.getElementById('editionBadge').innerText = edition ? `[${edition.toUpperCase()}]` : '';
        });

        socket.on('op_status_update', (hasOP) => {
            const el = document.getElementById('opStatus');
            if (hasOP === null) { el.innerText = 'CHECKING...'; el.style.color = '#FFAA00'; }
            else if (hasOP === true) { el.innerText = 'YES'; el.style.color = '#55FF55'; document.getElementById('alertBox').style.display='none'; }
            else { el.innerText = 'NO'; el.style.color = '#FF5555'; }
        });

        socket.on('op_alert', (data) => {
            document.getElementById('alertMessage').innerText = data.message;
            document.getElementById('alertBox').style.display = 'block';
        });

        socket.on('bot_log', addLog);
        socket.on('log_history', (history) => {
            logsEl.innerHTML = '';
            history.slice().reverse().forEach(addLog);
        });

        function addLog(msg) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            if (msg.includes('Error') || msg.includes('ALERT') || msg.includes('NO')) div.classList.add('error');
            else if (msg.includes('Success') || msg.includes('YES') || msg.includes('Connected')) div.classList.add('success');
            else div.classList.add('info');
            div.innerText = msg;
            logsEl.insertBefore(div, logsEl.firstChild);
            while (logsEl.children.length > 50) logsEl.removeChild(logsEl.lastChild);
        }

        function startBot() {
            socket.emit('control_bot', 'start', {
                host: document.getElementById('hostInput').value,
                port: document.getElementById('portInput').value,
                username: document.getElementById('usernameInput').value,
                edition: editionSelect.value,
                version: document.getElementById('versionInput').value,
                autoRejoin: document.getElementById('autoRejoin').checked
            });
        }

        function stopBot() {
            socket.emit('control_bot', 'stop');
        }
    </script>
</body>
</html>
